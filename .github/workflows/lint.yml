name: Lint

on:
  pull_request:
    branches: [main, master, 'release/**']
    paths:
      - 'api/resources/js/**'
      - 'api/.eslintrc.cjs'
      - 'api/package.json'
      - 'api/package-lock.json'
  push:
    branches: [main, master, 'release/**']
    paths:
      - 'api/resources/js/**'
      - 'api/.eslintrc.cjs'
      - 'api/package.json'
      - 'api/package-lock.json'

jobs:
  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
