[program:eis-bridge-queues]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/eis-bridge/api/artisan queue:work redis --sleep=3 --tries=3 --timeout=120 --queue=mapping,signing,transmission,retry,webhooks,default
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/eis-bridge/api/storage/logs/queue-worker.log
stopwaitsecs=3600
