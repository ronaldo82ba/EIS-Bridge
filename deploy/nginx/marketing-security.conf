# EIS Bridge marketing site hardening snippet for Forge.
# Paste inside Site -> eisbridge.com -> Nginx Configuration, inside the server block.

# Canonical not-found path for deny rules (avoid upstream 500).
location @marketing_not_found {
    return 404;
}

# Block sensitive/internal paths.
location ~ /\.(git|env) {
    return 404;
}
location = /marketing-deploy.sh { return 404; }
location = /connect-forge.ps1 { return 404; }
location ~* ^/(api|deploy|scripts)(/|$) { return 404; }
location ~* \.(sh|ps1)$ { return 404; }
location ~* ^/(README.*|RELEASE_NOTES.*)$ { return 404; }
location ~* \.(bak|backup|sql|sqlite|db|pem|key|p12|pfx|log|ini|conf)$ { return 404; }

# Restrict docs exposure to allowlisted public files only.
location /docs/ {
    location = /docs/partner-program.md { try_files $uri =404; }
    location = /docs/certification-playbook.md { try_files $uri =404; }
    location = /docs/vendor-api.md { try_files $uri =404; }
    location = /docs/qa/integration-test-cases-v1.md { try_files $uri =404; }
    location = /docs/postman/EIS-Bridge-API-v1.postman_collection.json { try_files $uri =404; }
    location = /docs/schemas/sale-object.schema.json { try_files $uri =404; }
    try_files "" @marketing_not_found;
}

# Security headers for static marketing pages.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.eisbridge.com https://sandbox.eisbridge.com; form-action 'self'; upgrade-insecure-requests" always;
